<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PT Nurinda Display</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0d0d0d;
color:white;
font-family:Segoe UI,Arial,sans-serif;
height:100vh;
overflow:hidden;

background-image:
linear-gradient(rgba(255,180,0,.05) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,180,0,.05) 1px, transparent 1px);

background-size:40px 40px;
}

.header{
height:18vh;
display:flex;
align-items:center;
padding:20px 60px;
border-bottom:4px solid #ffb000;
}

.logo{
height:120px;
margin-right:30px;
}

.company{
font-size:54px;
font-weight:bold;
}

.tagline{
font-size:24px;
color:#ffb000;
}

.main{
display:flex;
height:62vh;
}

.left{
width:50%;
padding:40px;
}

.right{
width:50%;
padding:40px;
}

.panel{
border:2px solid #ffb000;
padding:30px;
height:100%;
border-radius:12px;
}

.clock{
font-size:140px;
font-weight:bold;
color:#ffb000;
text-align:center;
}

.date{
font-size:42px;
text-align:center;
margin-top:10px;
}

.temp{
font-size:80px;
text-align:center;
margin-top:60px;
color:#00d0ff;
}

.airplay-title{
font-size:72px;
font-weight:bold;
color:#ffb000;
text-align:center;
}

.airplay-name{
font-size:56px;
margin-top:20px;
text-align:center;
}

.qr{
display:block;
margin:auto;
margin-top:30px;
height:280px;
}

.footer{
height:20vh;
display:flex;
align-items:center;
justify-content:center;
font-size:60px;
font-weight:bold;
background:#0f3;
color:black;
}

</style>
</head>

<body>

<div class="header">
<img src="logo.png" class="logo">

<div>
<div class="company">PT NURINDA</div>
<div class="tagline">
Manufacturing and Integrating Electrical Panels and System
</div>
</div>
</div>

<div class="main">

<div class="left">

<div class="panel">

<div class="clock" id="clock">
00:00:00
</div>

<div class="date" id="date"></div>

<div class="temp" id="temp">
-- °C
</div>

</div>

</div>

<div class="right">

<div class="panel">

<div class="airplay-title">
AIRPLAY READY
</div>

<div class="airplay-name">
Meeting Room
</div>

<img src="wifi-qr.png" class="qr">

<div style="text-align:center;font-size:28px;margin-top:20px;">
Scan QR untuk koneksi WiFi Guest
</div>

<div style="text-align:center;font-size:24px;margin-top:10px;">
SSID : NRD Guest
</div>

</div>

</div>

</div>

<div class="footer">
AIRPLAY AVAILABLE
</div>

<script>

function updateClock(){

const now = new Date();

document.getElementById("clock").innerHTML=
now.toLocaleTimeString('id-ID');

document.getElementById("date").innerHTML=
now.toLocaleDateString('id-ID',{
weekday:'long',
year:'numeric',
month:'long',
day:'numeric'
});

}

setInterval(updateClock,1000);
updateClock();

async function loadWeather(){

try{

const r = await fetch(
'https://api.open-meteo.com/v1/forecast?latitude=-6.2886&longitude=106.7179&current_weather=true'
);

const d = await r.json();

document.getElementById("temp").innerHTML =
d.current_weather.temperature + ' °C';

}catch(e){}

}

loadWeather();

setInterval(loadWeather,600000);

</script>

</body>
</html>
